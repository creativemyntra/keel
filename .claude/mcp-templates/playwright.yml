---
# Playwright MCP Configuration Template
# Generated by: /keel setup-mcp

name: playwright
type: direct
auth_method: none

config:
  # Browsers to use (install with: npm install -D playwright)
  browsers:
    - chromium   # Default, recommended
    - firefox    # Optional
    - webkit     # Optional (Safari)

  # Run in headless mode (no GUI)
  headless: true

  # Base URL for relative navigation
  base_url: "https://uat-app.example.com"

  # Timeouts (milliseconds)
  timeout: 30000              # Global timeout
  navigation_timeout: 30000   # Page load timeout
  action_timeout: 10000       # Action timeout

  # Viewport for responsive testing
  viewport:
    width: 1280
    height: 800

  # Device emulation (optional)
  device: null
  # Options: "iPhone 12", "Pixel 5", "Galaxy S5", etc.

availability: "testing"

# Features available to agents
features:
  - browser_navigate
  - browser_click
  - browser_type
  - browser_fill
  - browser_select
  - browser_check
  - browser_screenshot
  - browser_snapshot
  - read_console_logs
  - read_network_requests
  - read_page_content
  - evaluate_script
  - wait_for_selector
  - wait_for_navigation
  - wait_for_load_state

# Test environment configuration
test_env:
  base_url: "https://uat-app.example.com"
  api_base_url: "https://api.uat-app.example.com"
  admin_user: null      # Set if needed
  test_user: null       # Set if needed
  test_password: null   # Use .env instead

# Test data & fixtures
test_data:
  fixtures_path: "tests/fixtures"
  screenshots_path: "tests/screenshots"
  videos_path: "tests/videos"

# Recording & artifacts
recording:
  video: false          # Record video on failure
  screenshot: "only-on-failure"  # always, never, only-on-failure
  trace: false          # Record trace for debugging

# Logging & monitoring
logging:
  level: "info"
  log_network_requests: true
  log_console_messages: true
  mask_sensitive: true
