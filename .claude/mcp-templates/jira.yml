---
# Jira MCP Configuration Template
# Generated by: /keel setup-mcp

name: jira
type: oauth
auth_method: api-token

config:
  # Jira Cloud instance URL
  instance: "https://vidocqstudios.atlassian.net"

  # Your email address (used with API token)
  email: "your-email@company.com"

  # API Token (create at id.atlassian.com/manage-profile/security/api-tokens)
  api_token: ${JIRA_API_TOKEN}

  # Default project key (e.g., "KEEL", "H30", etc.)
  project_key: "KEEL"

  # Board ID for sprint planning (optional)
  board_id: null

  # Custom field mappings (optional)
  custom_fields:
    story_points: "customfield_10000"
    epic_link: "customfield_10001"
    design_doc_url: "customfield_10002"

availability: "production"

# Features available to agents
features:
  - read_issues
  - create_issue
  - update_issue
  - delete_issue
  - add_comment
  - add_attachment
  - link_issue
  - transition_status
  - list_issues
  - get_sprints
  - create_epic
  - list_projects

# Issue status workflow
workflow:
  statuses:
    - "To Do"
    - "In Progress"
    - "In Design"
    - "In Review"
    - "Testing"
    - "Done"

  transitions:
    start_development: "In Progress"
    complete_design: "In Design"
    request_review: "In Review"
    mark_testing: "Testing"
    mark_done: "Done"

# Rate limiting
rate_limit:
  max_requests_per_minute: 180
  cache_ttl_seconds: 300
  retry_attempts: 3
  retry_backoff_multiplier: 2

# Logging & monitoring
logging:
  level: "info"
  mask_sensitive: true
  audit_trail: true
