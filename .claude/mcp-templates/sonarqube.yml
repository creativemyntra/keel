---
# SonarQube MCP Configuration Template
# Generated by: /keel setup-mcp

name: sonarqube
type: direct
auth_method: token

config:
  # SonarQube instance URL
  instance: "https://sonarqube.example.com"

  # Authentication token
  # Create at: [instance]/account/security/generate-tokens
  token: ${SONARQUBE_TOKEN}

  # Project key (e.g., "com.example:keel")
  project_key: "com.example:keel"

  # Quality gate ID (optional)
  quality_gate_id: "1"

availability: "production"

# Features available to agents
features:
  - analyze_project
  - get_metrics
  - list_issues
  - get_issue_details
  - get_quality_gate_status
  - get_code_coverage
  - get_duplications
  - get_hotspots
  - search_issues
  - list_projects

# Code quality thresholds
quality_thresholds:
  coverage_minimum: 80        # % coverage required
  duplication_maximum: 5      # % duplication allowed
  maintainability_rating: "A" # A, B, C, D, E
  security_rating: "A"
  reliability_rating: "A"

# Issue severity levels to track
issue_tracking:
  severity_levels:
    - "BLOCKER"
    - "CRITICAL"
    - "MAJOR"
    - "MINOR"
    - "INFO"

  # Only fail if these are found
  fail_on_severity:
    - "BLOCKER"
    - "CRITICAL"

# Code coverage paths
coverage:
  language: "php"
  report_path: "build/clover.xml"
  inclusion_patterns:
    - "src/**/*.php"
  exclusion_patterns:
    - "tests/**/*.php"
    - "vendor/**/*.php"

# Timeouts & retry
timeout: 60000              # 60 seconds
retry_attempts: 3
retry_backoff_multiplier: 2

# Logging & monitoring
logging:
  level: "info"
  mask_sensitive: true
  audit_trail: true
