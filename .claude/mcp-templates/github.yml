---
# GitHub MCP Configuration Template
# Generated by: /keel setup-mcp

name: github
type: oauth
auth_method: personal-access-token

config:
  # Personal Access Token (create at github.com/settings/tokens)
  token: ${GITHUB_TOKEN}

  # Required scopes for Keel integration
  scopes:
    - repo              # Full control of private repositories
    - workflow          # GitHub Actions workflows
    - read:org          # Read-only organization info
    - delete_repo       # (Optional) Delete repos
    - admin:repo_hook   # (Optional) Manage webhooks

  # Repositories to manage
  repositories:
    - creativemyntra/keel
    # Add your project repos below:
    # - owner/repo-name

  # Organization (if applicable)
  organization: null  # Set to org name if using org repos

availability: "production"

# Features available to agents
features:
  - read_repositories
  - create_branch
  - create_pull_request
  - create_issue
  - comment_pr
  - comment_issue
  - merge_pr
  - list_workflows
  - trigger_workflow
  - create_release
  - create_tag
  - update_status_check

# Rate limiting
rate_limit:
  max_requests_per_hour: 5000
  cache_ttl_seconds: 300
  retry_attempts: 3
  retry_backoff_multiplier: 2

# Logging & monitoring
logging:
  level: "info"
  mask_sensitive: true
  audit_trail: true
