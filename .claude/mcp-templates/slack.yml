---
# Slack MCP Configuration Template
# Generated by: /keel setup-mcp

name: slack
type: oauth
auth_method: bot-token

config:
  # Slack workspace ID (visible in URLs)
  workspace_id: "T0G9QKQ16"

  # Bot token (create at api.slack.com/apps)
  # Format: xoxb-xxxxx
  bot_token: ${SLACK_BOT_TOKEN}

  # Channels for notifications
  channels:
    keel_ci: "#keel-ci"              # Pipeline notifications
    keel_releases: "#keel-releases"  # Deployment updates
    security_alerts: "#security-alerts"  # Security findings
    general: "#general"              # General notifications

availability: "production"

# Features available to agents
features:
  - send_message
  - send_file
  - send_blocks
  - react_message
  - add_reaction
  - list_channels
  - get_channel_info
  - get_user_info
  - list_users
  - upload_file
  - thread_reply

# Notification settings
notifications:
  # CI/Pipeline events
  pipeline:
    enabled: true
    channel: "keel_ci"
    events:
      - "phase_started"
      - "phase_completed"
      - "phase_failed"
      - "blockers_found"

  # Deployment events
  deployment:
    enabled: true
    channel: "keel_releases"
    events:
      - "deployment_started"
      - "canary_10"
      - "canary_50"
      - "rollout_100"
      - "deployment_complete"
      - "deployment_rollback"

  # Security events
  security:
    enabled: true
    channel: "security_alerts"
    events:
      - "critical_finding"
      - "high_finding"
      - "pci_violation"
      - "credential_leak"

  # Approval requests
  approvals:
    enabled: true
    mention: "channel"  # @channel, @here, or user ID
    events:
      - "design_review_needed"
      - "deployment_approval_needed"
      - "security_review_needed"

# Message formatting
formatting:
  use_threads: true
  include_metadata: true
  include_timestamps: true
  rich_formatting: true

# Timeouts & retry
timeout: 30000
retry_attempts: 3
retry_backoff_multiplier: 2

# Logging & monitoring
logging:
  level: "info"
  mask_sensitive: true
  audit_trail: true
