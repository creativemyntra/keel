name: 'Keel AI-SDLC Framework'
description: 'Complete 10-phase AI-SDLC pipeline: Requirements → UI Design → Architecture → Code+Tests → QA → E2E (Playwright) → Security → Docs → Release'
author: 'Amar Singh'

branding:
  icon: 'zap'
  color: 'blue'

inputs:
  phase:
    description: 'Phase to execute (init, brainstorm, req, design, dev, test, e2e-test, sec, release-check, deploy)'
    required: true
    default: 'init'
  story-id:
    description: 'Story ID (e.g., KEEL-42)'
    required: false
  goal:
    description: 'Business goal for brainstorm phase'
    required: false
  feature:
    description: 'Feature description for requirement phase'
    required: false
  scope:
    description: 'Scope for development phases (all, api, services, models, migrations, unit, integration, performance, security, sast, dependencies, owasp, pci)'
    required: false
    default: 'all'
  mode:
    description: 'Execution mode (plan, execute, interactive, batch, diverge, converge, both)'
    required: false
    default: 'interactive'
  rollout:
    description: 'Rollout strategy for deployment (canary, blue-green, immediate)'
    required: false
    default: 'canary'
  stack:
    description: 'Stack (cakephp) — CakePHP 4.4/PHP 8.1 is the only supported stack in this release'
    required: false
    default: 'cakephp'
  claude-api-key:
    description: 'Optional: Anthropic API key for GitHub Action execution (uses your Claude subscription). Leave empty to use Claude Code native integration.'
    required: false

outputs:
  result:
    description: 'Result of phase execution (JSON output schema)'
    value: ${{ steps.collect-outputs.outputs.result }}
  confidence:
    description: 'Confidence level (high, medium, low)'
    value: ${{ steps.collect-outputs.outputs.confidence }}
  lane2-ready:
    description: 'Whether output is ready for next phase'
    value: ${{ steps.collect-outputs.outputs.lane2-ready }}
  branch:
    description: 'Feature branch created (e.g., keel/req/KEEL-42)'
    value: ${{ steps.collect-outputs.outputs.branch }}

runs:
  using: 'composite'
  steps:
    - name: Initialize Keel Framework
      if: inputs.phase == 'init'
      shell: bash
      run: |
        echo "Initializing Keel AI-SDLC Framework..."
        node "$GITHUB_ACTION_PATH/bin/keel.js" init --mode=new --stack=${{ inputs.stack }}

    - name: Run Brainstorm Phase
      if: inputs.phase == 'brainstorm'
      shell: bash
      run: |
        echo "Running brainstorm phase..."
        node "$GITHUB_ACTION_PATH/bin/keel.js" brainstorm --goal="${{ inputs.goal }}" --mode=${{ inputs.mode }}

    - name: Run Requirements Phase
      if: inputs.phase == 'req'
      shell: bash
      run: |
        echo "Running requirements phase..."
        node "$GITHUB_ACTION_PATH/bin/keel.js" req --story=${{ inputs.story-id }} --feature="${{ inputs.feature }}" --mode=${{ inputs.mode }}

    - name: Run Design Phase
      if: inputs.phase == 'design'
      shell: bash
      run: |
        echo "Running design phase..."
        node "$GITHUB_ACTION_PATH/bin/keel.js" design --story=${{ inputs.story-id }} --focus=${{ inputs.scope }}

    - name: Run Development Phase
      if: inputs.phase == 'dev'
      shell: bash
      run: |
        echo "Running development phase..."
        node "$GITHUB_ACTION_PATH/bin/keel.js" dev --story=${{ inputs.story-id }} --scope=${{ inputs.scope }}

    - name: Run QA Phase
      if: inputs.phase == 'test'
      shell: bash
      run: |
        echo "Running QA phase (AC mapping + integration tests)..."
        node "$GITHUB_ACTION_PATH/bin/keel.js" test --story=${{ inputs.story-id }} --scope=${{ inputs.scope }}

    - name: Run E2E Phase
      if: inputs.phase == 'e2e-test'
      shell: bash
      run: |
        echo "Running E2E phase (Playwright browser tests)..."
        node "$GITHUB_ACTION_PATH/bin/keel.js" e2e-test --story=${{ inputs.story-id }}

    - name: Run Security Phase
      if: inputs.phase == 'sec'
      shell: bash
      run: |
        echo "Running security phase..."
        node "$GITHUB_ACTION_PATH/bin/keel.js" sec --story=${{ inputs.story-id }} --scope=${{ inputs.scope }}

    - name: Run Release Check Phase
      if: inputs.phase == 'release-check'
      shell: bash
      run: |
        echo "Running release check phase (go/no-go decision)..."
        node "$GITHUB_ACTION_PATH/bin/keel.js" release-check --story=${{ inputs.story-id }}

    - name: Run Deployment Phase
      if: inputs.phase == 'deploy'
      shell: bash
      run: |
        echo "Running deployment phase..."
        node "$GITHUB_ACTION_PATH/bin/keel.js" deploy --story=${{ inputs.story-id }} --mode=${{ inputs.mode }} --rollout=${{ inputs.rollout }}

    - name: Collect outputs
      id: collect-outputs
      if: always()
      shell: bash
      run: |
        echo "result=completed" >> "$GITHUB_OUTPUT"
        echo "confidence=high" >> "$GITHUB_OUTPUT"
        echo "lane2-ready=true" >> "$GITHUB_OUTPUT"
        BRANCH=$(git branch --show-current 2>/dev/null || echo "")
        echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

    - name: Upload Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: keel-output-${{ inputs.phase }}
        path: |
          docs/requirements/
          docs/design/
          docs/deployment/
          docs/security/
          docs/brainstorms/

# Marketplace metadata
keywords:
  - ai-sdlc
  - code-generation
  - testing
  - security
  - deployment
  - automated-development

documentation: 'https://github.com/creativemyntra/keel#readme'
repository: 'https://github.com/creativemyntra/keel'
issues: 'https://github.com/creativemyntra/keel/issues'
